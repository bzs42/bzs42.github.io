<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bzs42</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0d0d;
            color: #d4d4d4;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            line-height: 1.7;
            min-height: 100vh;
        }

        .control {
            font-size: clamp(17px, 4.6vw, 34px);
            white-space: pre;
        }

        .var {
            color: #9cdcfe;
        }

        .comment {
            color: #6a9955;
        }

        a.cap:link,
        a.cap:visited,
        a.cap:active {
            color: #FBA90A;
            text-decoration: none;
            font-weight: bold;
            text-decoration: underline;
        }

        a.cap:hover {
            background: #eee;
        }

    </style>
</head>

<body>

<pre class="control">
    <span class="control">[</span>🌍<span class="control">](</span><span class="var">bzs42</span><span class="control">){</span>
        <a id="art" class="cap" href="art/m/index.html">Art work</a>    <span class="comment">// my artworks</span>
        🚀
    <span class="control">}</span>
</pre>

    <script>
        window.addEventListener('DOMContentLoaded', (event) => {
            const isWideEnough = window.innerWidth >= 1024;
            const hasHover = window.matchMedia('(hover: hover)').matches;

            if (isWideEnough && hasHover) {
                document.getElementById('art').href = "art/d/index.html";
            }
        });
    </script>
</body>

</html>
