<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Wortspiel-Herausforderung</title>
    <style>
        :root {
            --bg:       #FAF7F2;
            --surface:  #FFFFFF;
            --primary:  #0F5E5E;
            --accent:   #E8A33D;
            --text:     #1A1A1A;
            --muted:    #5C5C5C;
            --divider:  #E0DAD0;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            padding: 24px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--divider);
            border-radius: 16px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
            text-align: center;
        }
        h1     { color: var(--accent); margin: 0 0 8px; font-size: 18px; }
        h2     { margin: 0 0 24px; font-size: 24px; }
        p      { color: var(--muted); line-height: 1.5; margin: 12px 0; }
        .rack  { font-family: ui-monospace, "SF Mono", Menlo, monospace;
                 font-size: 28px; letter-spacing: .25em;
                 color: var(--primary); margin: 24px 0; }
        a.btn  { display: inline-block; padding: 12px 24px;
                 background: var(--primary); color: white;
                 border-radius: 12px; text-decoration: none;
                 margin-top: 12px; }
        small  { color: var(--muted); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Herausforderung!</h1>
        <h2 id="from-line">Jemand fordert dich heraus.</h2>
        <div class="rack" id="rack-line">…</div>
        <p>
            Wenn die Wortspiel-App installiert ist, öffnet sie sich
            gleich automatisch.
        </p>
        <a class="btn" id="open-link" href="#">App öffnen</a>
        <p><small>Noch keine App? Lade Wortspiel auf dein Gerät und
                  öffne den Link erneut.</small></p>
    </div>
    <script>
    // Build the wortspiel:// URL from the current query string and try
    // to hand it to the OS. When the app is installed and registered
    // for that scheme, the OS opens it; otherwise the user stays on
    // this page and can install the app first.
    (function () {
        const params = new URLSearchParams(window.location.search);
        const letters = (params.get("l") || "").toUpperCase();
        const from    = params.get("n") || "";
        const fallback = "wortspiel://challenge?" + params.toString();

        if (letters) document.getElementById("rack-line").textContent = letters;
        if (from)    document.getElementById("from-line").textContent =
            from + " fordert dich heraus.";
        document.getElementById("open-link").href = fallback;

        // Auto-redirect once after layout. Universal Links / App Links
        // intercept this before navigation happens; if not, the user
        // sees the page and can tap the button manually.
        setTimeout(() => { window.location.replace(fallback); }, 120);
    })();
    </script>
</body>
</html>
