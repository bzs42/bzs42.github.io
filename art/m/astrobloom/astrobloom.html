<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>bzs42::artwork — Astrobloom</title>
    <style>
        :root {
            --void: #08060a;
            --void-warm: #140b0a;
            --bloom: #ff2f1c;
            --bloom-glow: rgba(255, 47, 28, 0.55);
            --wire: #c9ced3;
            --accent: #FBA90A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            background: radial-gradient(120% 90% at 50% 45%, var(--void-warm) 0%, var(--void) 60%);
            color: var(--wire);
            font-family: "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            overflow: hidden;
        }

        /* Breadcrumb in Amber (wie auf der Desktop-Astrobloom-Seite); unterstrichen. */
        .crumbs {
            flex: 0 0 auto;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .crumbs a {
            color: inherit;
            text-decoration: underline;
        }

        .wtitle {
            flex: 0 0 auto;
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.2;
            color: var(--bloom);
            text-shadow: 0 0 16px var(--bloom-glow);
        }

        .wtitle .ns {
            color: var(--wire);
            text-shadow: none;
        }

        .stage {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .featured {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        .thumbs {
            flex: 0 0 auto;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: var(--bloom) transparent;
        }

        .thumb {
            flex: 0 0 auto;
            height: 76px;
            width: 76px;
            object-fit: cover;
            display: block;
            cursor: pointer;
            opacity: 0.55;
            border: 2px solid transparent;
            transition: opacity 0.25s ease, border-color 0.25s ease;
        }

        .thumb.active {
            opacity: 1;
            border-color: var(--bloom);
            box-shadow: 0 0 12px var(--bloom-glow);
        }
    </style>
</head>

<body>

    <nav class="crumbs"><a href="../../../index.html">bzs42</a>::<a href="../index.html">artwork</a></nav>
    <h1 class="wtitle"><span class="ns">::zenobotanis.</span>Astrobloom</h1>

    <div class="stage">
        <img class="featured" id="featured" src="P_20260501_190841_1290.webp"
            alt="Astrobloom – die vollständige Astrobionik-Skulptur" />
    </div>

    <div class="thumbs" id="thumbs">
        <img class="thumb active" src="P_20260501_190841_400.webp" data-full="P_20260501_190841_1290.webp" alt="Astrobloom – die vollständige Astrobionik-Skulptur" />
        <img class="thumb" src="P_20260501_190938_400.webp" data-full="P_20260501_190938_1290.webp" alt="Astrobloom – Nahansicht einer großen roten Acrylglas-Blüte" />
        <img class="thumb" src="P_20260501_190956_400.webp" data-full="P_20260501_190956_1290.webp" alt="Astrobloom – die rissige Regolith-Keramikbasis mit Metalldraht-Antennen" />
    </div>

    <script>
        // Tap auf ein Thumbnail tauscht das große Bild und markiert den aktiven Thumb.
        const featured = document.getElementById("featured");
        const thumbs = Array.from(document.querySelectorAll(".thumb"));

        thumbs.forEach(function (t) {
            t.addEventListener("click", function () {
                featured.src = t.dataset.full;
                featured.alt = t.alt;
                thumbs.forEach(function (x) { x.classList.remove("active"); });
                t.classList.add("active");
            });
        });
    </script>
</body>

</html>
