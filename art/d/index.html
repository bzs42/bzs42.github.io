<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bzs42::artwork</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            color: white;
            background-color: black;
            font-family: "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            padding: 0px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            flex: 0 0 auto;
            margin: 8px 0 16px;
            color: #FBA90A;
            text-align: right;
        }

        h2 {
            flex: 0 0 auto;
            margin: 8px 0;
            color: #FBA90A;
            text-align: right;
        }

        /* The link rows share the remaining vertical space equally so that
           together they fill the full height of the window. */
        nav {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
        }

        a.row {
            position: relative;
            flex: 1 1 0;
            display: flex;
            align-items: center;
            padding: 0 24px;
            overflow: hidden;
            font-size: clamp(1.5rem, 7vh, 6rem);
            font-weight: 600;
            text-decoration: none;
            line-height: 1;
            transition: color 4s ease, font-size 0.5s ease, padding 0.5s ease;
        }

        a.row:link,
        a.row:visited,
        a.row:active {
            color: Azure;
        }

        /* The per-row background image lives on its own layer so its opacity
           can be transitioned for a soft fade-in (background-image itself is
           not animatable). */
        a.row::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)),
                var(--bg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        a.row:hover::before {
            opacity: 1;
        }

        /* Keep the label above the image layer. The left/transform pair lets
           the label glide smoothly to the horizontal centre on hover. */
        a.row .label {
            position: relative;
            z-index: 1;
            display: inline-block;
            left: 0;
            transform: translateX(0);
            transition: left 0.5s ease, transform 0.5s ease;
        }

        /* On hover the whole row reveals its image and the label slides
           into the centre of the screen. */
        a.row:hover {
            color: White;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
            font-size: clamp(2rem, 9vh, 7.5rem);
            padding: 0 48px;
        }

        a.row:hover .label {
            left: 50%;
            transform: translateX(-50%);
        }

        /* The "Lyrics" prefix only appears when its row is hovered. */
        .label .prefix {
            display: none;
        }

        a.row:hover .label .prefix {
            display: inline;
            color: #FBA90A;
        }

        a.return {
            flex: 0 0 auto;
            margin-top: 16px;
            color: #183BF0;
        }
    </style>
</head>

<body>
