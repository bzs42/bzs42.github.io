<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bzs42::artwork — 50 Shades of Purple</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        html {
            background-color: black;
        }

        body {
            color: white;
            font-family: "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header & footer match art/d/index.html. They collapse and fade out
           together with the titles (same .titles-hidden toggle), handing the
           freed vertical space to the gallery. */
        header,
        footer {
            flex: 0 0 auto;
            text-align: right;
            overflow: hidden;
            max-height: 3rem;
            opacity: 1;
            transition: max-height 0.6s ease, opacity 0.4s ease;
        }

        h1 {
            font-size: 1.5rem;
            color: #FBA90A;
        }

        .return {
            display: inline-block;
            margin-top: 8px;
            color: #536DFE;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .return:hover {
            color: #FBA90A;
        }

        body.titles-hidden header,
        body.titles-hidden footer {
            max-height: 0;
            opacity: 0;
        }

        /* Two rows that split the available height equally. */
        .gallery {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 0;
        }

        .gallery-row {
            flex: 1 1 0;
            display: flex;
            gap: 16px;
            min-height: 0;
        }

        figure {
            flex: 1 1 0;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
        }

        /* The image takes all the room the caption leaves behind, so when the
           caption collapses the picture grows into the freed space. */
        figure img {
            flex: 1 1 0;
            width: 100%;
            min-height: 0;
            object-fit: contain;
            display: block;
        }

        figcaption {
            flex: 0 0 auto;
            overflow: hidden;
            text-align: center;
            color: #FBA90A;
            font-size: 24px;
            max-height: 2.4rem;
            padding-top: 8px;
            opacity: 1;
            /* Animating max-height/padding gradually hands the space to the
               image above, so the picture scales up as the title fades out. */
            transition: max-height 0.6s ease, padding-top 0.6s ease, opacity 0.4s ease;
        }

        /* Titles hidden: captions collapse to nothing, images take over. */
        body.titles-hidden figcaption {
            max-height: 0;
            padding-top: 0;
            opacity: 0;
        }
    </style>
</head>

<body>

    <header>
        <h1>bzs42::artwork.50 Shades of Purple - Light Fever</h1>
    </header>

    <div class="gallery">
        <div class="gallery-row">
            <figure>
                <figcaption>Immersive Ego Zentrifuge</figcaption>
                <img src="50shades/20240315_163053_edited.jpg" alt="Light Fever — 15.03.2024" />
            </figure>
            <figure>
                <figcaption>Transit</figcaption>
                <img src="50shades/20240511_163443_edited.jpg" alt="Light Fever — 11.05.2024" />
            </figure>
            <figure>
                <figcaption>Interferenz</figcaption>
                <img src="50shades/P_20250125_182638_edited.jpg" alt="Light Fever — 25.01.2025" />
            </figure>
            <figure>
                <figcaption>Lichtstrom</figcaption>
                <img src="50shades/P_20250703_000143_edited.jpg" alt="Light Fever — 03.07.2025" />
            </figure>
        </div>
        <div class="gallery-row">
            <figure>
                <img src="50shades/P_20250823_211758_edited.jpg" alt="Light Fever — 23.08.2025" />
                <figcaption>Orbit</figcaption>
            </figure>
            <figure>
                <img src="50shades/PSX_20250918_220054_1.jpg" alt="Light Fever — 18.09.2025" />
                <figcaption>Ekstase</figcaption>
            </figure>
            <figure>
                <img src="50shades/P_20251220_111434_edited.jpg" alt="Light Fever — 20.12.2025" />
                <figcaption>Inversion</figcaption>
            </figure>
            <figure>
                <img src="50shades/P_20251231_235720_edited.jpg" alt="Light Fever — 31.12.2025" />
                <figcaption>Supernova</figcaption>
            </figure>
        </div>
    </div>


    <footer>
        <a class="return" href="index.html">← return</a>
    </footer>

    <script>
        // Titles, header and footer start visible, fade out after 2s of
        // stillness, and come back on any mouse movement (which also restarts
        // the 2s countdown).
        let hideTimer;

        function hideTitles() {
            document.body.classList.add("titles-hidden");
        }

        function showTitles() {
            document.body.classList.remove("titles-hidden");
            clearTimeout(hideTimer);
            hideTimer = setTimeout(hideTitles, 5000);
        }

        hideTimer = setTimeout(hideTitles, 5000);
        window.addEventListener("mousemove", showTitles);
    </script>
</body>

</html>
